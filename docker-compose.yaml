services:
  backend:
    build:
      context: ./minseok
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./minseok:/app
    env_file:
      - .env  # JWT_SECRET 등 비밀값 (environment가 같은 키보다 우선)
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://redocean:redocean@pgvector:5432/redoceanmap
      - OLLAMA_HOST=http://host.docker.internal:11434
      - N8N_EMAIL_WEBHOOK_URL=http://n8n:5678/webhook/redocean-email
      - AWS_REGION=ap-northeast-2
      - VISION_S3_BUCKET=redoceanmap.com-752767405178-ap-northeast-2-an
    depends_on:
      pgvector:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./www:/app
      - /app/.next
      - /app/node_modules
    command: npm run dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:8000

  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      # redoceanmap이 메인 — 정식 포트 5432 사용 (ragwatson pgvector는 5433으로 이동).
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-redocean}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-redocean}
      - POSTGRES_DB=${POSTGRES_DB:-redoceanmap}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redocean -d redoceanmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/please_change}

volumes:
  n8n_data:
    name: n8n_data
  redis_data:
  pgvector_data:
  neo4j_data:
