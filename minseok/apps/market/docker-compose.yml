services:
  db:
    image: pgvector/pgvector:pg17
    container_name: market-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-market}
      TZ: Asia/Seoul
    ports:
      # 호스트 5432(redoceanmap) 점유 → 5434 (market-database.md §2.1)
      - "${DB_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market} -d ${POSTGRES_DB:-market}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
