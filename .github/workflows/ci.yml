name: CI

on:
  push:
    branches: [mac, main, window]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: minseok
    env:
      # core.config가 임포트 시점에 요구하는 값 — CI에서 실제 DB 접속은 없다(테스트는 스텁)
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-only-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: minseok/requirements.txt
      # torch는 리눅스 기본이 CUDA 동반 휠(수 GB) — CPU 휠을 먼저 깔아 시간·디스크 절약
      - name: Install torch (CPU)
        run: pip install torch==2.12.1 torchvision==0.27.1 --index-url https://download.pytorch.org/whl/cpu
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Architecture harness (import-linter)
        run: PYTHONPATH=apps lint-imports --config .importlinter
      - name: Tests
        run: PYTHONPATH=.:apps pytest apps tests -q -m "not network and not ollama"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: www
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: www/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build (type check 포함)
        run: npm run build
